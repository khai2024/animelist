<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>AnimeList</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Sidebar Smooth */
        #sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #0a0a0a;
            z-index: 5000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid #1a1a1a;
        }
        #sidebar.active { transform: translateX(280px); }

        /* Card Minimalis */
        .anime-card {
            background: #0f0f0f;
            border-radius: 10px;
            transition: transform 0.2s ease;
        }
        .anime-card:active { transform: scale(0.96); }

        .btn-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
            color: #777;
            transition: 0.2s;
        }
        .btn-nav.active { background: #2563eb; color: #fff; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Skeleton */
        .shimmer {
            background: #111;
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, #1a1a1a, transparent);
            animation: move 1.5s infinite;
        }
        @keyframes move { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-[4500] hidden" onclick="toggleMenu()"></div>

    <div id="sidebar" class="p-6">
        <div class="text-xl font-extrabold mb-10 flex items-center gap-2 tracking-tighter">
            ANIME<span class="text-blue-500">LIST</span>
        </div>
        <nav class="space-y-1">
            <button onclick="changeTab('anime')" id="m-anime" class="btn-nav w-full active"><i class="fa fa-fire text-sm"></i> Trending</button>
            <button onclick="changeTab('schedule')" id="m-schedule" class="btn-nav w-full"><i class="fa fa-calendar text-sm"></i> Schedule</button>
            <button onclick="changeTab('character')" id="m-character" class="btn-nav w-full"><i class="fa fa-user text-sm"></i> Characters</button>
            <button onclick="changeTab('season')" id="m-season" class="btn-nav w-full"><i class="fa fa-bolt text-sm"></i> Seasonal</button>
        </nav>
    </div>

    <header class="sticky top-0 z-[1000] px-4 py-4 bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-6xl mx-auto flex items-center gap-3">
            <button onclick="toggleMenu()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-lg active:scale-90 transition-transform">
                <i class="fa fa-bars-staggered"></i>
            </button>
            <div class="flex-1 relative">
                <input type="text" id="searchInput" placeholder="Search anime..." 
                    class="w-full bg-[#111] border border-white/5 rounded-lg py-2.5 px-4 outline-none focus:border-blue-500 text-sm transition-all">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="daySelectorContainer" class="hidden flex gap-2 overflow-x-auto no-scrollbar mb-6">
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('monday', this)">MON</button>
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('tuesday', this)">TUE</button>
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('wednesday', this)">WED</button>
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('thursday', this)">THU</button>
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('friday', this)">FRI</button>
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('saturday', this)">SAT</button>
            <button class="day-btn px-5 py-2 bg-[#111] rounded-lg text-[10px] font-bold" onclick="fetchSchedule('sunday', this)">SUN</button>
        </div>

        <h2 id="sectionTitle" class="text-lg font-bold mb-6 text-white/50 uppercase tracking-widest">Trending Anime</h2>
        
        <div id="mainGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <div id="detailOverlay" class="fixed inset-0 bg-black z-[9999] hidden overflow-y-auto no-scrollbar">
        <div id="detailContent"></div>
    </div>

    <script>
        let currentTab = 'anime';
        const mainGrid = document.getElementById('mainGrid');
        const overlay = document.getElementById('detailOverlay');
        const detailContent = document.getElementById('detailContent');
        const daySelector = document.getElementById('daySelectorContainer');

        window.onload = () => fetchData();

        function toggleMenu() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            sb.classList.toggle('active');
            ov.classList.toggle('hidden');
        }

        function changeTab(tab) {
            currentTab = tab;
            toggleMenu();
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById('m-' + tab).classList.add('active');
            document.getElementById('sectionTitle').innerText = tab.toUpperCase();
            tab === 'schedule' ? daySelector.classList.remove('hidden') : daySelector.classList.add('hidden');
            if(tab === 'schedule') fetchSchedule('monday'); else fetchData();
        }

        async function fetchData(q = '') {
            mainGrid.innerHTML = Array(10).fill('<div class="shimmer aspect-[3/4.5] rounded-xl"></div>').join('');
            let url = q ? `https://api.jikan.moe/v4/${currentTab === 'character' ? 'characters' : 'anime'}?q=${q}&limit=25` 
                        : (currentTab === 'anime' ? 'https://api.jikan.moe/v4/top/anime?limit=25' : (currentTab === 'character' ? 'https://api.jikan.moe/v4/top/characters?limit=25' : 'https://api.jikan.moe/v4/seasons/now?limit=25'));
            try {
                const res = await fetch(url);
                const {data} = await res.json();
                renderCards(data);
            } catch(e) {}
        }

        async function fetchSchedule(day, btn) {
            if(btn) {
                document.querySelectorAll('.day-btn').forEach(b => b.style.background = '#111');
                btn.style.background = '#2563eb';
            }
            mainGrid.innerHTML = Array(10).fill('<div class="shimmer aspect-[3/4.5] rounded-xl"></div>').join('');
            const res = await fetch(`https://api.jikan.moe/v4/schedules?filter=${day}`);
            const {data} = await res.json();
            renderCards(data);
        }

        function renderCards(data) {
            mainGrid.innerHTML = '';
            if(!data) return;
            data.forEach(item => {
                const isChar = currentTab === 'character';
                const img = item.images?.webp?.image_url || item.images?.jpg?.image_url;
                mainGrid.innerHTML += `
                    <div class="anime-card" onclick="openDetail(${item.mal_id}, '${isChar ? 'characters' : 'anime'}')">
                        <div class="aspect-[3/4.2] relative overflow-hidden rounded-t-lg">
                            <img src="${img}" class="w-full h-full object-cover" loading="lazy">
                            ${!isChar && item.score ? `<div class="absolute bottom-2 right-2 bg-blue-600 px-2 py-0.5 rounded text-[10px] font-black">★ ${item.score}</div>` : ''}
                        </div>
                        <div class="p-3">
                            <h3 class="text-[11px] font-bold line-clamp-1">${isChar ? item.name : item.title}</h3>
                        </div>
                    </div>`;
            });
        }

        async function openDetail(id, type) {
            overlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            detailContent.innerHTML = '<div class="h-screen flex items-center justify-center text-xs tracking-widest opacity-30">LOADING...</div>';
            
            try {
                const res = await fetch(`https://api.jikan.moe/v4/${type}/${id}${type === 'anime' ? '/full' : ''}`);
                const {data} = await res.json();
                const isChar = type === 'characters';

                if(isChar) {
                    detailContent.innerHTML = `
                        <div class="max-w-2xl mx-auto p-6">
                            <button onclick="closeDetail()" class="text-[10px] mb-10 font-bold opacity-50 uppercase tracking-widest"><i class="fa fa-arrow-left"></i> Back</button>
                            <h1 class="text-4xl font-black mb-1">${data.name}</h1>
                            <p class="text-blue-500 font-bold mb-10">${data.name_kanji || ''}</p>
                            <div class="text-sm leading-relaxed text-white/70 whitespace-pre-line text-justify">${data.about || 'No Bio.'}</div>
                            <div class="h-20"></div>
                        </div>`;
                } else {
                    // DETAIL ANIME LEBIH LENGKAP
                    detailContent.innerHTML = `
                        <div class="max-w-4xl mx-auto p-6">
                            <button onclick="closeDetail()" class="text-[10px] mb-8 font-bold opacity-50 uppercase tracking-widest"><i class="fa fa-arrow-left"></i> Back</button>
                            <div class="flex flex-col md:flex-row gap-8">
                                <div class="w-full md:w-72 flex-shrink-0">
                                    <img src="${data.images.webp.large_image_url}" class="w-full rounded-xl shadow-2xl border border-white/5">
                                    <div class="mt-4 space-y-2">
                                        <div class="bg-[#111] p-3 rounded-lg border border-white/5">
                                            <p class="text-[8px] opacity-40 uppercase font-black">Score</p>
                                            <p class="font-bold text-blue-500 text-lg">★ ${data.score || 'N/A'}</p>
                                        </div>
                                        <div class="bg-[#111] p-3 rounded-lg border border-white/5">
                                            <p class="text-[8px] opacity-40 uppercase font-black">Ranked</p>
                                            <p class="font-bold">#${data.rank || '-'}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <h1 class="text-3xl font-black mb-1">${data.title}</h1>
                                    <p class="text-blue-500 font-bold mb-6">${data.title_japanese || ''}</p>
                                    
                                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-8">
                                        <div class="border-l-2 border-blue-600 pl-3"><p class="text-[9px] opacity-40 uppercase">Type</p><p class="text-xs font-bold">${data.type}</p></div>
                                        <div class="border-l-2 border-blue-600 pl-3"><p class="text-[9px] opacity-40 uppercase">Status</p><p class="text-xs font-bold">${data.status}</p></div>
                                        <div class="border-l-2 border-blue-600 pl-3"><p class="text-[9px] opacity-40 uppercase">Episodes</p><p class="text-xs font-bold">${data.episodes || '?'}</p></div>
                                        <div class="border-l-2 border-blue-600 pl-3"><p class="text-[9px] opacity-40 uppercase">Studio</p><p class="text-xs font-bold">${data.studios?.[0]?.name || '-'}</p></div>
                                        <div class="border-l-2 border-blue-600 pl-3"><p class="text-[9px] opacity-40 uppercase">Duration</p><p class="text-xs font-bold">${data.duration}</p></div>
                                        <div class="border-l-2 border-blue-600 pl-3"><p class="text-[9px] opacity-40 uppercase">Rating</p><p class="text-xs font-bold">${data.rating || '-'}</p></div>
                                    </div>

                                    <h4 class="text-[10px] font-black uppercase tracking-[4px] mb-4 opacity-30">Synopsis</h4>
                                    <p class="text-sm leading-relaxed text-white/80 text-justify">${data.synopsis || 'No synopsis.'}</p>
                                    
                                    <div class="mt-8">
                                        <h4 class="text-[10px] font-black uppercase tracking-[4px] mb-4 opacity-30">Genres</h4>
                                        <div class="flex flex-wrap gap-2">
                                            ${data.genres?.map(g => `<span class="bg-blue-600/10 border border-blue-500/20 px-3 py-1 rounded-full text-[10px] font-bold text-blue-400">${g.name}</span>`).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="h-20"></div>
                        </div>`;
                }
            } catch(err) { closeDetail(); }
        }

        function closeDetail() { 
            overlay.classList.add('hidden'); 
            document.body.style.overflow = 'auto'; 
        }
        
        let timer;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(timer);
            timer = setTimeout(() => fetchData(e.target.value), 500);
        });
    </script>
</body>
</html>
