<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>AnimeList</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --accent: #3b82f6; --bg: #000000; --card: #0d0d0d; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* INTRO & CLOSE ANIMATION */
        #introOverlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; transition: all 1s ease-in-out; }
        #introOverlay.hide { opacity: 0; filter: blur(20px); transform: scale(1.1); pointer-events: none; }

        /* SIDEBAR MENU */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #080808; z-index: 4000; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.1); padding: 30px 20px; }
        #sidebar.active { left: 0; }
        .menu-item { padding: 15px; border-radius: 12px; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; font-size: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover, .menu-item.active-nav { background: var(--accent); color: white; }
        #sidebarOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3500; display: none; }

        /* LIST DETAIL CARD */
        .anime-card-detail { background: var(--card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); display: flex; gap: 15px; padding: 12px; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .anime-card-detail img { width: 90px; height: 130px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }

        #detailOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; overflow-y: auto; padding: 20px; }
        #detailOverlay.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="introOverlay">
        <div class="text-center">
            <h1 class="text-5xl font-black tracking-tighter text-white mb-2">Anime<span class="text-blue-500">List</span></h1>
            <p id="introText" class="text-blue-400 font-bold text-[10px] uppercase tracking-[5px] opacity-0 transition-opacity duration-1000">Welcome to Database</p>
        </div>
    </div>

    <div id="sidebarOverlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <h2 class="text-2xl font-black mb-8 px-4 text-white">Anime<span class="text-blue-500">List</span></h2>
        <div class="menu-item active-nav" id="m-anime" onclick="changeTab('anime')"><i class="fa fa-home w-5 text-center"></i> Home</div>
        <div class="menu-item" id="m-schedule" onclick="changeTab('schedule')"><i class="fa fa-calendar w-5 text-center"></i> Schedule</div>
        <div class="menu-item" id="m-character" onclick="changeTab('character')"><i class="fa fa-user w-5 text-center"></i> Characters</div>
        <div class="menu-item" id="m-season" onclick="changeTab('season')"><i class="fa fa-clapperboard w-5 text-center"></i> Current Season</div>
    </div>

    <header class="bg-black/95 sticky top-0 z-[100] border-b border-white/10 p-4">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="text-xl px-2"><i class="fa fa-bars"></i></button>
            <h1 class="text-lg font-black tracking-tighter shrink-0" onclick="location.reload()">Anime<span class="text-blue-500">List</span></h1>
            <div class="flex-1 relative">
                <input type="text" id="searchInput" placeholder="Search..." class="w-full bg-[#111] border border-white/10 rounded-xl py-2 px-4 text-sm outline-none focus:ring-2 focus:ring-blue-600 text-white">
            </div>
        </div>
    </header>

    <div id="daySelectorContainer" class="hidden p-4 overflow-x-auto flex gap-3 no-scrollbar bg-[#050505]">
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('monday')">MON</button>
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('tuesday')">TUE</button>
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('wednesday')">WED</button>
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('thursday')">THU</button>
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('friday')">FRI</button>
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('saturday')">SAT</button>
        <button class="px-5 py-2 bg-white/5 rounded-xl text-[10px] font-black" onclick="fetchSchedule('sunday')">SUN</button>
    </div>

    <main class="p-4 min-h-screen">
        <h2 id="sectionTitle" class="text-xl font-black mb-6 border-l-4 border-blue-500 pl-3 uppercase tracking-tight">Popular</h2>
        <div id="mainGrid" class="flex flex-col gap-1"></div>
    </main>

    <div id="detailOverlay" class="no-scrollbar"><div id="detailContent"></div></div>

    <script>
        let currentTab = 'anime';
        const mainGrid = document.getElementById('mainGrid');
        const overlay = document.getElementById('detailOverlay');
        const detailContent = document.getElementById('detailContent');
        const daySelector = document.getElementById('daySelectorContainer');

        window.onload = () => {
            const intro = document.getElementById('introOverlay');
            const text = document.getElementById('introText');
            setTimeout(() => { text.style.opacity = '1'; }, 500);
            setTimeout(() => {
                intro.classList.add('hide');
                fetchData(); 
            }, 3000); 
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            const ov = document.getElementById('sidebarOverlay');
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function changeTab(tab) {
            currentTab = tab;
            toggleMenu();
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active-nav'));
            document.getElementById('m-' + tab).classList.add('active-nav');
            
            tab === 'schedule' ? daySelector.classList.remove('hidden') : daySelector.classList.add('hidden');
            if(tab === 'schedule') fetchSchedule('monday'); else fetchData();
        }

        async function fetchData(q = '') {
            mainGrid.innerHTML = '<p class="text-center py-20 opacity-30 text-[10px] font-black tracking-[3px] animate-pulse">LOADING...</p>';
            let url = q ? `https://api.jikan.moe/v4/${currentTab === 'character' ? 'characters' : 'anime'}?q=${q}&limit=25` 
                        : (currentTab === 'anime' ? 'https://api.jikan.moe/v4/top/anime?limit=25' : (currentTab === 'character' ? 'https://api.jikan.moe/v4/top/characters?limit=25' : 'https://api.jikan.moe/v4/seasons/now?limit=25'));
            
            try {
                const res = await fetch(url);
                const {data} = await res.json();
                renderCards(data);
            } catch(e) { }
        }

        async function fetchSchedule(day) {
            mainGrid.innerHTML = '<p class="text-center py-20 opacity-30 text-[10px] font-black">LOADING...</p>';
            const res = await fetch(`https://api.jikan.moe/v4/schedules?filter=${day}`);
            const {data} = await res.json();
            renderCards(data);
        }

        function renderCards(data) {
            mainGrid.innerHTML = '';
            if(!data) return;
            data.forEach(item => {
                const isChar = currentTab === 'character';
                mainGrid.innerHTML += `
                    <div class="anime-card-detail" onclick="openDetail(${item.mal_id}, '${isChar ? 'characters' : 'anime'}')">
                        <img src="${item.images.webp.image_url}" loading="lazy">
                        <div class="flex-1">
                            <h3 class="text-[14px] font-black text-white mb-2 line-clamp-1 uppercase tracking-tight">${isChar ? item.name : item.title}</h3>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-blue-500 font-black text-[9px] uppercase tracking-widest">${isChar ? 'Char' : (item.type || 'TV')}</span>
                                ${!isChar ? `<span class="text-[10px] opacity-40 font-bold">★ ${item.score || 'N/A'}</span>` : ''}
                            </div>
                            <p class="text-[10px] opacity-50 line-clamp-2 leading-relaxed text-white">
                                ${isChar ? (item.name_kanji || 'Character') : (item.synopsis || 'No description available.')}
                            </p>
                        </div>
                    </div>`;
            });
        }

        async function openDetail(id, type) {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            detailContent.innerHTML = '<p class="text-center mt-40 font-black text-blue-500 animate-pulse text-xs uppercase tracking-[5px]">LOADING</p>';
            try {
                const res = await fetch(`https://api.jikan.moe/v4/${type}/${id}${type === 'anime' ? '/full' : ''}`);
                const {data} = await res.json();
                const imageSize = "w-2/3 mx-auto block rounded-3xl mb-8 shadow-2xl border border-white/10";

                if(type === 'characters') {
                    detailContent.innerHTML = `
                        <button onclick="closeDetail()" class="mb-6 font-black text-blue-500 text-[10px] bg-white/5 px-5 py-2.5 rounded-xl uppercase tracking-widest">← Back</button>
                        <img src="${data.images.webp.image_url}" class="${imageSize}">
                        <h1 class="text-2xl font-black text-center text-white mb-1 uppercase">${data.name}</h1>
                        <p class="text-blue-500 font-bold text-lg text-center mb-8">${data.name_kanji || ''}</p>
                        <div class="bg-white/5 p-6 rounded-3xl text-sm opacity-70 leading-relaxed text-justify whitespace-pre-line text-white">${data.about || 'No bio.'}</div>
                    `;
                } else {
                    detailContent.innerHTML = `
                        <button onclick="closeDetail()" class="mb-6 font-black text-blue-500 text-[10px] bg-white/5 px-5 py-2.5 rounded-xl uppercase tracking-widest">← Back</button>
                        <img src="${data.images.webp.large_image_url}" class="${imageSize}">
                        <h1 class="text-xl font-black text-center text-white mb-4 px-4 uppercase">${data.title}</h1>
                        <div class="grid grid-cols-3 gap-3 mb-8 px-2 text-center">
                            <div class="bg-white/5 p-3 rounded-2xl border border-white/5"><p class="text-[8px] opacity-30 uppercase font-black">Score</p><p class="font-black text-blue-500">★ ${data.score || 'N/A'}</p></div>
                            <div class="bg-white/5 p-3 rounded-2xl border border-white/5"><p class="text-[8px] opacity-30 uppercase font-black">Rank</p><p class="font-black">#${data.rank || '-'}</p></div>
                            <div class="bg-white/5 p-3 rounded-2xl border border-white/5"><p class="text-[8px] opacity-30 uppercase font-black">EPS</p><p class="font-black">${data.episodes || '?'}</p></div>
                        </div>
                        <p class="text-[10px] font-black opacity-30 mb-4 ml-4 uppercase tracking-[4px]">Synopsis</p>
                        <div class="text-sm opacity-70 leading-[1.8] text-justify px-4 text-white mb-10">${data.synopsis || 'No synopsis.'}</div>
                        <div class="h-10"></div>
                    `;
                }
            } catch(err) { closeDetail(); }
        }

        function closeDetail() { overlay.classList.remove('active'); document.body.style.overflow = 'auto'; }
        
        let timer;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(timer);
            timer = setTimeout(() => fetchData(e.target.value), 600);
        });
    </script>
</body>
</html>
